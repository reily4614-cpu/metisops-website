<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 66" role="img" aria-label="MetisOps — Enterprise AI Solutions">
  <defs>
    <linearGradient id="metisGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe6a8"/>
      <stop offset="0.5" stop-color="#e7b761"/>
      <stop offset="1" stop-color="#c8923a"/>
    </linearGradient>
  </defs>

  <!-- Original geometric "M" emblem -->
  <path d="M88 32 L88 9 L100 24 L112 9 L112 32"
        fill="none" stroke="url(#metisGold)" stroke-width="4.4"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Wordmark -->
  <text x="100" y="51" text-anchor="middle"
        font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Arial, sans-serif"
        font-size="23" font-weight="700" letter-spacing="0.3">
    <tspan fill="#f4f7fb">Metis</tspan><tspan fill="url(#metisGold)">Ops</tspan>
  </text>

  <!-- Tagline -->
  <text x="100" y="62" text-anchor="middle"
        font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Arial, sans-serif"
        font-size="6" font-weight="600" letter-spacing="2.6" fill="#d6a24a">ENTERPRISE AI SOLUTIONS</text>
</svg>
